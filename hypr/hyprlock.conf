general {
    hide_cursor = true
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 10
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

# HORAS
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H')"
    color = rgba(226,226,233,1.0)
    font_size = 110
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# MINUTOS
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%M')"
    color = rgba(226,226,233,1.0)
    font_size = 110
    font_family = JetBrainsMono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

# DIA
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A')"
    color = rgba(226,226,233,0.88)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -65
    halign = center
    valign = center
}

# DATA
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%d %b')"
    color = rgba(226,226,233,0.78)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -95
    halign = center
    valign = center
}

# BARRA DE SENHA
input-field {
    monitor =
    size = 320, 54
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = -1
    rounding = 999

    outer_color = rgba(176,198,255,0.30)
    inner_color = rgba(30,31,37,0.12)

    check_color = rgba(176,198,255,0.30)
    capslock_color = rgba(176,198,255,0.30)
    numlock_color = rgba(176,198,255,0.30)
    bothlock_color = rgba(176,198,255,0.30)

    fail_color = rgba(255,180,171,0.95)

    font_color = rgba(255,255,255,1)
    placeholder_text =

    position = 0, -235
    halign = center
    valign = center
    placeholder_text =
    fail_text = 

    hide_input = false
    swap_font_color = false
    fade_on_empty = false
}
